[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
preDeployCommand = "php artisan migrate --force && php artisan optimize:clear && php artisan config:cache && php artisan event:cache && php artisan route:cache && php artisan view:cache"
healthcheckPath = "/up"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
