name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, bcmath, pcntl, sodium, zip
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Configure application
        run: cp .env.example .env

      - name: Start Sail
        run: vendor/bin/sail up --wait --wait-timeout 120

      - name: Generate application key
        run: vendor/bin/sail artisan key:generate --no-interaction

      - name: Verify migrations
        run: vendor/bin/sail artisan migrate --force --no-interaction

      - name: Build frontend assets
        run: |
          vendor/bin/sail npm install --ignore-scripts --no-package-lock
          vendor/bin/sail npm run build

      - name: Format PHP
        run: |
          vendor/bin/sail bin pint --format agent
          git diff --exit-code

      - name: Run PHPUnit suite
        run: vendor/bin/sail artisan test --compact

      - name: Audit Composer dependencies
        run: vendor/bin/sail composer audit

      - name: Stop Sail
        if: always()
        run: vendor/bin/sail down
